<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tango Pro Live</title>
    <script src="https://download.agora.io/sdk/release/AgoraRTC_N.js"></script>
    <script src="https://www.paypal.com/sdk/js?client-id=ATfsClCXiMMz7YyApME13i3yJkQK4UPDTL3PwPNh10Et5d17z9cpk-6_q0MqvCrVya9T5kwcc-OCY&currency=USD"></script>

    <style>
        :root { --primary: #ff007f; --dark: #0a0a0a; --card: #161616; --gold: #ffd700; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif; }
        body { background: var(--dark); color: white; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }

        /* Page Navigation */
        .page-section { display: none; flex: 1; overflow-y: auto; padding-bottom: 90px; }
        .active-section { display: block; }

        /* Top Bar */
        header { display: flex; justify-content: space-between; padding: 15px; background: var(--card); border-bottom: 1px solid #222; }
        .coins { color: var(--gold); font-weight: bold; background: #222; padding: 5px 12px; border-radius: 20px; font-size: 14px; }

        /* Explore/Home Grid */
        .user-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; padding: 10px; }
        .user-box { background: var(--card); height: 200px; border-radius: 15px; position: relative; overflow: hidden; border: 1px solid #222; }
        .user-box img { width: 100%; height: 100%; object-fit: cover; }

        /* Floating Live Button */
        .live-btn-container { position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%); z-index: 99; }
        .go-live-btn { background: var(--primary); width: 60px; height: 60px; border-radius: 50%; border: 4px solid #0a0a0a; font-size: 25px; color: white; cursor: pointer; box-shadow: 0 0 15px var(--primary); }

        /* 1:1 Private Call Section */
        .call-card { background: var(--card); margin: 10px; padding: 15px; border-radius: 15px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #333; }
        .btn-call { background: #28a745; color: white; border: none; padding: 8px 20px; border-radius: 20px; font-weight: bold; cursor: pointer; }

        /* Profile Section */
        .profile-head { text-align: center; padding: 30px; background: #111; border-bottom: 1px solid #222; }
        .profile-img { width: 80px; height: 80px; border-radius: 50%; border: 3px solid var(--primary); }
        .menu-item { background: var(--card); padding: 15px; margin: 5px 15px; border-radius: 12px; display: flex; justify-content: space-between; cursor: pointer; }

        /* Bottom Tab Bar */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; display: flex; background: var(--card); border-top: 1px solid #222; padding: 12px 0; z-index: 1000; }
        .nav-tab { flex: 1; text-align: center; color: #666; font-size: 12px; cursor: pointer; }
        .nav-tab.active { color: var(--primary); }

        /* Full Screen Live View */
        #live-screen { display: none; position: fixed; inset: 0; background: #000; z-index: 5000; }
        #video-container { width: 100%; height: 100%; background: #222; }
        .end-btn { position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%); background: #ff3b30; color: white; border: none; padding: 12px 35px; border-radius: 30px; font-weight: bold; }
    </style>
</head>
<body>

    <header>
        <h3 style="color: var(--primary);">TANGO</h3>
        <div class="coins">🪙 <span id="coin-balance">0</span></div>
    </header>

    <section id="explore" class="page-section active-section">
        <div class="user-grid">
            <div class="user-box"><img src="https://images.unsplash.com/photo-1524504388940-b1c1722653e1?w=400"></div>
            <div class="user-box"><img src="https://images.unsplash.com/photo-1539571696357-5a69c17a67c6?w=400"></div>
        </div>
        <div class="live-btn-container">
            <button class="go-live-btn" onclick="startBroadcasting()">🎥</button>
        </div>
    </section>

    <section id="private" class="page-section">
        <div style="padding: 15px;">
            <h3 style="margin-bottom: 15px;">Private Call Requests</h3>
            <div class="call-card">
                <div>
                    <strong>User Name</strong><br>
                    <small style="color: #888;">$10.00 per minute</small>
                </div>
                <button class="btn-call" onclick="alert('Starting 1:1 Private Call...')">📞 Call Now</button>
            </div>
        </div>
    </section>

    <section id="profile" class="page-section">
        <div class="profile-head">
            <img id="user-pic" src="https://via.placeholder.com/150" class="profile-img">
            <h3 id="display-name" style="margin-top: 10px;">Guest</h3>
        </div>
        <div class="menu-list" style="margin-top: 10px;">
            <div class="menu-item" onclick="alert('Wallet Opening...')">💰 My Wallet <span>></span></div>
            <div class="menu-item" onclick="alert('Coins Menu...')">🪙 Buy Coins <span>></span></div>
            <div class="menu-item" onclick="alert('Settings...')">⚙️ Settings <span>></span></div>
            <div class="menu-item" style="color: #ff3b30;" onclick="location.reload()">🚪 Logout</div>
        </div>
    </section>

    <footer class="bottom-nav">
        <div class="nav-tab active" onclick="showPage('explore', this)">🏠<br>Explore</div>
        <div class="nav-tab" onclick="showPage('private', this)">📞<br>1:1 Call</div>
        <div class="nav-tab" onclick="showPage('profile', this)">👤<br>Profile</div>
    </footer>

    <div id="live-screen">
        <div id="video-container"></div>
        <button class="end-btn" onclick="stopBroadcasting()">End Stream</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
        import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        // Your Config
        const firebaseConfig = {
            apiKey: "AIzaSyBwDUe5E8qRY1dbZzUQJu9eCAKBS7YSHVU",
            authDomain: "live-e6771.firebaseapp.com",
            projectId: "live-e6771",
            storageBucket: "live-e6771.firebasestorage.app",
            messagingSenderId: "570901004231",
            appId: "1:570901004231:web:220679cf41cf55b98023e2"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let rtc = { client: null, video: null, audio: null };
        const APP_ID = "8c1dec62ad5342199e2552883a4b583f";

        // Login automatically
        signInAnonymously(auth).catch(e => console.error("Login Failed", e));

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                const snap = await getDoc(doc(db, "users", user.uid));
                if (snap.exists()) {
                    document.getElementById('coin-balance').innerText = snap.data().coins || 0;
                } else {
                    await setDoc(doc(db, "users", user.uid), { coins: 100, name: "Star" });
                }
            }
        });

        // 1. Fixing Navigation (Page Switch)
        window.showPage = (id, el) => {
            document.querySelectorAll('.page-section').forEach(p => p.classList.remove('active-section'));
            document.getElementById(id).classList.add('active-section');
            document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
            el.classList.add('active');
        };

        // 2. Fixing Camera (Start Live)
        window.startBroadcasting = async () => {
            try {
                rtc.client = AgoraRTC.createClient({ mode: "rtc", codec: "vp8" });
                await rtc.client.join(APP_ID, "test_room", null, null);
                
                rtc.audio = await AgoraRTC.createMicrophoneAudioTrack();
                rtc.video = await AgoraRTC.createCameraVideoTrack();
                
                document.getElementById('live-screen').style.display = 'block';
                rtc.video.play("video-container");
                
                await rtc.client.publish([rtc.audio, rtc.video]);
            } catch (err) {
                console.error(err);
                alert("Camera Error: කරුණාකර Browser එකේ Camera Permission 'Allow' කරන්න.");
            }
        };

        window.stopBroadcasting = async () => {
            rtc.video.stop(); rtc.video.close(); rtc.audio.close();
            await rtc.client.leave();
            document.getElementById('live-screen').style.display = 'none';
        };

    </script>
</body>
</html>
